<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>USNow · Content</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   USNOW · CONTENT RENDERER
   Shared template for Journal articles and Gallery images.
   Two render paths:
     kind:"article" → hero, body, optional companion image at end
                      (companion image is NOT zoomable here —
                      it links to its gallery entry instead)
     kind:"image"   → hero, framed image with full pan/zoom viewer,
                      optional short body prose, sidebar with
                      back-link to companion essay
   ============================================================ */

:root {
  /* Editorial (warm) palette */
  --ink: #0e0c0a;
  --paper: #f8f4ee;
  --paper-dark: #ede8df;
  --amber: #c8821a;
  --amber-light: #e8a030;
  --amber-pale: rgba(200,130,26,0.08);
  --phosphor: #3a8a3a;
  --phosphor-pale: rgba(58,138,58,0.08);
  --muted: #6b6058;
  --rule: rgba(14,12,10,0.12);

  /* USNow cosmic palette */
  --cosmic-bg: #04080f;
  --cosmic-text: #f0ece4;
  --cosmic-gold: #c9a84c;
  --cosmic-blue: #4a80b8;
  --cosmic-soft: #8aa0b8;
  --cosmic-deep: #1a4a7a;
  --cosmic-rule: rgba(26,74,122,0.35);
  --cosmic-green: #3a9a70;
  --cosmic-green-soft: rgba(74,154,112,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Source Serif 4', Georgia, serif;
  font-weight: 300;
  font-size: 19px;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
/* Image-kind pages have dark body */
body.image-kind {
  background: var(--cosmic-bg);
  color: var(--cosmic-text);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
body.image-kind ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

/* ── USNOW NAV — constant ─────────────────────────────────── */
nav.usnow-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  background: rgba(4,8,15,0.97);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--cosmic-rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  height: 50px;
}
.nav-logo { display: flex; flex-direction: column; gap: 1px; text-decoration: none; }
.nav-logo-row { display: flex; align-items: center; gap: 8px; }
.us {
  font-size: 19px; font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--cosmic-gold);
  font-family: 'DM Mono', 'Courier New', monospace;
}
.now {
  font-size: 11px; letter-spacing: 0.4em;
  color: var(--cosmic-soft);
  font-family: 'DM Mono', 'Courier New', monospace;
  opacity: 0.65;
}
.nav-tagline {
  font-size: 7px; letter-spacing: 0.12em;
  color: rgba(201,168,76,0.4);
  font-family: 'DM Mono', 'Courier New', monospace;
}
.nav-back {
  font-size: 9px; letter-spacing: 0.22em;
  color: var(--cosmic-blue);
  font-family: 'DM Mono', 'Courier New', monospace;
  text-decoration: none;
  opacity: 0.7;
  transition: all 0.2s;
  border: 1px solid var(--cosmic-rule);
  padding: 5px 14px;
  border-radius: 14px;
}
.nav-back:hover { opacity: 1; border-color: var(--cosmic-blue); }

/* ── HERO ─────────────────────────────────────────────────── */
.hero {
  padding: 90px 40px 72px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 24px;
  position: relative;
}
.hero-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(38px, 7vw, 76px);
  font-weight: 900;
  line-height: 1.0;
  margin-bottom: 18px;
  position: relative;
  letter-spacing: -0.02em;
}
.hero-subtitle {
  font-family: 'Source Serif 4', serif;
  font-size: clamp(16px, 2.4vw, 21px);
  font-style: italic;
  font-weight: 300;
  max-width: 620px;
  margin: 0 auto 28px;
  position: relative;
  line-height: 1.5;
}
.hero-rule {
  width: 60px; height: 2px;
  margin: 0 auto 20px;
  position: relative;
}
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  position: relative;
  max-width: 700px;
  margin: 0 auto;
}
.hero-meta .pill {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.16em;
  padding: 6px 12px;
  border-radius: 999px;
  text-transform: uppercase;
}

/* HERO STYLE: dark-amber */
.hero.dark-amber { background: var(--ink); color: var(--paper); }
.hero.dark-amber::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(58,138,58,0.10) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 50%, rgba(200,130,26,0.10) 0%, transparent 60%);
}
.hero.dark-amber .hero-eyebrow { color: var(--amber); }
.hero.dark-amber .hero-title { color: var(--paper); }
.hero.dark-amber .hero-title em { color: var(--amber-light); font-style: normal; }
.hero.dark-amber .hero-subtitle { color: rgba(248,244,238,0.6); }
.hero.dark-amber .hero-rule { background: var(--amber); }
.hero.dark-amber .hero-meta .pill {
  color: rgba(248,244,238,0.55);
  border: 1px solid rgba(248,244,238,0.18);
  background: rgba(248,244,238,0.04);
}

/* HERO STYLE: dark-cosmic */
.hero.dark-cosmic { background: var(--cosmic-bg); color: var(--cosmic-text); }
.hero.dark-cosmic::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(42,120,80,0.10) 0%, transparent 65%),
    radial-gradient(ellipse at 30% 80%, rgba(74,128,184,0.08) 0%, transparent 60%);
}
.hero.dark-cosmic .hero-eyebrow { color: var(--cosmic-gold); }
.hero.dark-cosmic .hero-title {
  color: var(--cosmic-text);
  font-family: 'Georgia', serif;
  font-weight: 300;
  letter-spacing: 0.01em;
}
.hero.dark-cosmic .hero-title em { color: var(--cosmic-green); font-style: normal; }
.hero.dark-cosmic .hero-subtitle {
  color: rgba(240,236,228,0.55);
  font-family: 'Georgia', serif;
  font-style: normal;
}
.hero.dark-cosmic .hero-rule {
  background: linear-gradient(90deg, transparent, rgba(74,154,112,0.6), transparent);
  width: 80px;
}
.hero.dark-cosmic .hero-meta .pill {
  color: var(--cosmic-soft);
  border: 1px solid var(--cosmic-rule);
  background: rgba(255,255,255,0.03);
}

/* HERO STYLE: dark-paper */
.hero.dark-paper { background: var(--ink); color: var(--paper); }
.hero.dark-paper::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(140,40,40,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(200,130,26,0.06) 0%, transparent 60%);
}
.hero.dark-paper .hero-eyebrow { color: #c8521a; }
.hero.dark-paper .hero-title { color: var(--paper); }
.hero.dark-paper .hero-title em { color: #e8a030; font-style: normal; }
.hero.dark-paper .hero-subtitle { color: rgba(248,244,238,0.6); }
.hero.dark-paper .hero-rule { background: #c8521a; }
.hero.dark-paper .hero-meta .pill {
  color: rgba(248,244,238,0.55);
  border: 1px solid rgba(248,244,238,0.18);
  background: rgba(248,244,238,0.04);
}

/* ============================================================
   ARTICLE PATH (kind:"article")
   ============================================================ */

/* Body container */
.article-wrap {
  background: var(--paper);
  padding: 72px 24px 40px;
}
.article-grid {
  max-width: 1080px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 56px;
  align-items: start;
}
.article-grid.no-sidebar {
  grid-template-columns: minmax(0, 1fr);
}
.article-body {
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

.article-body p {
  margin-bottom: 1.6em;
  font-size: 19px;
  line-height: 1.8;
  color: var(--ink);
}
.article-body p.dropcap::first-letter {
  font-family: 'Playfair Display', serif;
  font-size: 4.2em;
  font-weight: 700;
  float: left;
  line-height: 0.75;
  margin: 8px 12px 0 0;
  color: var(--amber);
}
.article-body .section-break {
  text-align: center;
  margin: 52px 0;
  color: var(--amber);
  letter-spacing: 12px;
  font-size: 14px;
  opacity: 0.6;
  font-family: 'DM Mono', monospace;
}
.article-body .pullquote {
  margin: 48px -12px;
  padding: 32px 36px;
  border-left: 4px solid var(--amber);
  background: var(--amber-pale);
}
.article-body .pullquote p {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 3vw, 26px);
  font-style: italic;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.45;
  margin: 0;
}
.article-body .pullquote-attr {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--amber);
  margin-top: 14px;
  display: block;
  text-transform: uppercase;
}
.article-body .callout {
  margin: 44px 0;
  padding: 28px 32px;
  border: 1px solid var(--rule);
  border-top: 3px solid var(--ink);
  background: var(--paper-dark);
}
.article-body .callout-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.article-body .callout ul { list-style: none; padding: 0; }
.article-body .callout ul li {
  font-size: 17px;
  line-height: 1.6;
  padding: 7px 0;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 0;
}
.article-body .callout ul li:last-child { border-bottom: none; }
.article-body .callout ul li::before {
  content: '→';
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  flex-shrink: 0;
  margin-top: 2px;
}
.article-body .phosphor-block {
  margin: 44px -12px;
  padding: 32px 36px;
  background: var(--phosphor-pale);
  border-left: 4px solid var(--phosphor);
}
.article-body .phosphor-block p {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  line-height: 1.8;
  color: #2a5a2a;
  margin: 0;
}
.article-body .phosphor-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--phosphor);
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: 0.75;
}
.article-body .capture-block {
  margin: 56px -28px;
  padding: 48px 52px;
  background: var(--ink);
  position: relative;
  border-radius: 2px;
}
.article-body .capture-block::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 20% 50%, rgba(200,130,26,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.article-body .capture-block p {
  color: var(--paper);
  font-size: clamp(17px, 2.4vw, 20px);
  line-height: 1.85;
  margin-bottom: 1.4em;
  position: relative;
}
.article-body .capture-block p:last-child { margin-bottom: 0; }
.article-body .capture-block strong { color: var(--amber-light); font-weight: 600; }
.article-body ul.threshold {
  margin: 36px 0;
  padding: 0;
  list-style: none;
}
.article-body ul.threshold li {
  padding: 11px 0 11px 28px;
  border-bottom: 1px solid var(--rule);
  font-size: 17px;
  position: relative;
  line-height: 1.5;
  margin-bottom: 0;
}
.article-body ul.threshold li:first-child { border-top: 1px solid var(--rule); }
.article-body ul.threshold li::before {
  content: '✦';
  position: absolute;
  left: 0;
  color: var(--amber);
  font-size: 11px;
  top: 14px;
}
.article-body .declaration {
  margin: 56px 0 0;
  padding: 44px 0;
  border-top: 2px solid var(--ink);
  border-bottom: 2px solid var(--ink);
  text-align: center;
}
.article-body .declaration p {
  font-family: 'Playfair Display', serif;
  font-size: clamp(19px, 3vw, 26px);
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 0.6em;
  color: var(--ink);
}
.article-body .declaration p:last-child { margin-bottom: 0; }
.article-body .declaration em {
  font-style: italic;
  font-weight: 400;
  color: var(--amber);
}

/* ── COMPANION IMAGE — sized to the article column, inline with the essay ─
   Sits like the closing photograph of a magazine essay: same width as the
   reading column, modest shadow, no full-bleed presentation. The big
   panable view lives in the gallery entry, one tap away. */
.companion-image-wrap {
  background: var(--paper);
  padding: 0 24px 56px;
}
.companion-image-inner {
  max-width: 680px;
  margin: 0 auto;
  text-align: center;
}
.companion-rule {
  width: 50%;
  max-width: 200px;
  height: 1px;
  background: var(--rule);
  margin: 0 auto 40px;
}
.companion-frame {
  display: block;
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  border: 1px solid rgba(14,12,10,0.15);
  border-radius: 3px;
  overflow: hidden;
  background: #1a1a1a;
  box-shadow:
    0 12px 28px rgba(0,0,0,0.14),
    0 2px 8px rgba(0,0,0,0.08);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
a.companion-frame {
  cursor: pointer;
  text-decoration: none;
}
a.companion-frame:hover {
  transform: translateY(-2px);
  box-shadow:
    0 16px 36px rgba(0,0,0,0.18),
    0 3px 12px rgba(0,0,0,0.10);
}
.companion-frame img {
  width: 100%;
  height: auto;
  display: block;
  background: #1a1a1a;
}
.companion-caption {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 14px;
  padding: 0 12px;
}
.companion-caption a {
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1px;
  transition: all 0.18s;
}
.companion-caption a:hover {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

/* ============================================================
   IMAGE-KIND PATH (kind:"image")
   Full pan/zoom viewer, framed image up top, optional body
   ============================================================ */
.gallery-wrap {
  background: var(--cosmic-bg);
  padding: 36px 24px 60px;
}
.gallery-frame {
  max-width: 1120px;
  margin: 0 auto;
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 6px;
  overflow: hidden;
  background: #020508;
  box-shadow:
    0 24px 70px rgba(0,0,0,0.55),
    0 6px 20px rgba(0,0,0,0.35),
    0 0 60px rgba(201,168,76,0.06);
}
.gallery-button {
  appearance: none;
  border: 0;
  background: transparent;
  width: 100%;
  display: block;
  cursor: zoom-in;
  padding: 0;
}
.gallery-button img {
  width: 100%;
  max-height: 80vh;
  object-fit: contain;
  display: block;
  background: #020508;
}
.gallery-caption {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: rgba(138,160,184,0.6);
  text-transform: uppercase;
  text-align: center;
  margin: 18px auto 0;
  max-width: 920px;
  padding: 0 12px;
}

.gallery-body-wrap {
  background: var(--cosmic-bg);
  padding: 40px 24px 60px;
}
.gallery-body-grid {
  max-width: 1080px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 56px;
  align-items: start;
}
.gallery-body-grid.no-sidebar {
  grid-template-columns: minmax(0, 1fr);
}
.gallery-body {
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}
.gallery-body p {
  font-family: 'Source Serif 4', serif;
  font-size: 18px;
  line-height: 1.8;
  color: rgba(240,236,228,0.85);
  margin-bottom: 1.4em;
}
.gallery-body em {
  color: var(--cosmic-green);
  font-style: italic;
}

/* ============================================================
   SIDEBAR — different palette per kind
   ============================================================ */
.sidebar {
  position: sticky;
  top: 80px;
  align-self: start;
}
.sidebar-section {
  padding: 22px 0;
  border-top: 1px solid var(--rule);
}
.sidebar-section:first-child { border-top: 0; padding-top: 0; }
.sidebar-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.24em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.sidebar-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.sidebar-pill {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink);
  text-decoration: none;
  border: 1px solid var(--rule);
  padding: 7px 11px;
  border-radius: 999px;
  background: var(--paper);
  transition: all 0.18s;
}
.sidebar-pill:hover {
  border-color: var(--amber);
  color: var(--amber);
  background: var(--amber-pale);
}
.external-link {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--ink);
  text-decoration: none;
  border: 1px solid var(--ink);
  padding: 11px 16px;
  border-radius: 4px;
  background: var(--paper);
  transition: all 0.18s;
  text-transform: uppercase;
}
.external-link:hover {
  background: var(--ink);
  color: var(--paper);
}

/* Image-kind sidebar overrides */
body.image-kind .sidebar-section { border-top-color: var(--cosmic-rule); }
body.image-kind .sidebar-label { color: var(--cosmic-soft); }
body.image-kind .sidebar-pill {
  color: var(--cosmic-text);
  border-color: var(--cosmic-rule);
  background: rgba(255,255,255,0.03);
}
body.image-kind .sidebar-pill:hover {
  border-color: var(--cosmic-green);
  color: var(--cosmic-green);
  background: rgba(74,154,112,0.08);
}
body.image-kind .external-link {
  color: var(--cosmic-text);
  border-color: var(--cosmic-rule);
  background: transparent;
}
body.image-kind .external-link:hover {
  background: var(--cosmic-text);
  color: var(--cosmic-bg);
}

/* ── BYLINE / FOOTER ─────────────────────────────────────── */
.byline {
  max-width: 680px;
  margin: 0 auto;
  padding: 28px 24px 0;
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 16px;
}
.byline-wrap {
  background: var(--paper);
  padding: 0 0 80px;
}
body.image-kind .byline-wrap { background: var(--cosmic-bg); padding-top: 24px; }
body.image-kind .byline { border-top-color: var(--cosmic-rule); }
.byline-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
body.image-kind .byline-avatar { background: var(--cosmic-deep); }
.byline-name {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ink);
  text-transform: uppercase;
  margin-bottom: 3px;
}
body.image-kind .byline-name { color: var(--cosmic-text); }
.byline-pub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
}
body.image-kind .byline-pub { color: var(--cosmic-soft); }

footer.usnow-footer {
  background: var(--cosmic-bg);
  padding: 28px 22px;
  border-top: 1px solid var(--cosmic-rule);
  text-align: center;
}
footer.usnow-footer a {
  font-size: 9px;
  color: rgba(74,128,184,0.5);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.14em;
  text-decoration: none;
  transition: color 0.2s;
  margin: 0 10px;
}
footer.usnow-footer a:hover { color: var(--cosmic-gold); }

/* ── LIGHTBOX VIEWER (image-kind only) ───────────────────── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 5000;
  background: rgba(0,0,0,0.97);
  overflow: hidden;
  touch-action: none;
}
#lightbox.open { display: block; }
#lightbox-canvas {
  position: absolute;
  inset: 0;
  cursor: grab;
  user-select: none;
}
#lightbox-canvas.dragging { cursor: grabbing; }
#lightbox-img-viewer {
  position: absolute;
  left: 0; top: 0;
  transform-origin: 0 0;
  will-change: transform;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease;
}
#lightbox-img-viewer img {
  display: block;
  max-width: none;
  user-select: none;
  -webkit-user-drag: none;
}
#lightbox-close {
  position: fixed;
  top: calc(16px + env(safe-area-inset-top));
  right: 20px;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.6);
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 8px 14px;
  border-radius: 10px;
  transition: all 0.2s;
  z-index: 5002;
  background: rgba(0,0,0,0.5);
}
#lightbox-close:hover { color: #fff; border-color: #fff; }
#lightbox-hint {
  position: fixed;
  bottom: calc(20px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.22);
  font-family: 'DM Mono', monospace;
  pointer-events: none;
  white-space: nowrap;
  z-index: 5002;
}
#lightbox-zoom-indicator {
  position: fixed;
  top: calc(16px + env(safe-area-inset-top));
  left: 20px;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.4);
  font-family: 'DM Mono', monospace;
  z-index: 5002;
  transition: opacity 0.3s;
}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .article-grid, .gallery-body-grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  .sidebar {
    position: static;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    border-top: 1px solid var(--rule);
    padding-top: 32px;
  }
  body.image-kind .sidebar { border-top-color: var(--cosmic-rule); }
  .sidebar-section:first-child { border-top: 0; }
}
@media (max-width: 600px) {
  body { font-size: 18px; }
  .hero { padding: 72px 22px 56px; }
  .article-wrap { padding: 48px 20px 32px; }
  .companion-image-wrap { padding: 0 20px 56px; }
  .companion-rule { margin-bottom: 40px; }
  .article-body p { font-size: 18px; }
  .article-body .pullquote { margin: 36px 0; padding: 24px 24px; }
  .article-body .capture-block { margin: 44px -16px; padding: 36px 28px; }
  .article-body .phosphor-block { margin: 36px 0; padding: 24px 24px; }

}

/* ── ERROR STATE ─────────────────────────────────────────── */

  max-width: 580px;

  text-align: center;
}

  font-family: 'Playfair Display', serif;

}

  color: var(--muted);

}

  letter-spacing: 0.16em;

<body>

<nav class="usnow-nav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-row"><span class="us">US</span><span class="now">NOW</span></div>
    <span class="nav-tagline">THE QUESTION IS THE ANSWER.</span>
  </a>
  <a href="#" id="back-link" class="nav-back">← BACK</a>
</nav>

<main id="content-root"></main>

<footer class="usnow-footer">
  <a href="index.html">USNow Home</a>
  <a href="journal.html">The Journal</a>
  <a href="gallery.html">The Gallery</a>
  <a href="graphic-info.html">Graphic Images</a>
</footer>

<!-- Lightbox viewer — only used by kind:"image" entries -->
<div id="lightbox">
  <div id="lightbox-canvas">
    <div id="lightbox-img-viewer"><img id="lightbox-img" src="" alt=""/></div>
  </div>
  <button id="lightbox-close" onclick="closeLightbox()">CLOSE ×</button>
  <div id="lightbox-zoom-indicator">100%</div>
  <div id="lightbox-hint">SCROLL TO ZOOM · DRAG TO PAN · PINCH ON MOBILE · DOUBLE-CLICK TO RESET</div>
</div>

<script src="content-data.js"></script>
<script>
/* ============================================================
   RENDERER
   ============================================================ */

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const root = document.getElementById('content-root');

if (!id || !window.CONTENT[id]) {
  root.innerHTML = `
    <div class="error-state">
      <h1>Not found</h1>
      <p>${id ? `No entry exists with id "${escapeHtml(id)}".` : 'No content id was provided.'}</p>
      <a href="index.html">← Back to USNow</a>
    </div>
  `;
} else {
  renderEntry(window.CONTENT[id]);
  bindGalleryButtons();
}

// Bind click handlers on any gallery-button rendered into the page.
// Uses data attributes rather than inline onclick to avoid breakage from
// special characters (apostrophes, em dashes) in alt/caption text.
function bindGalleryButtons() {
  document.querySelectorAll('.gallery-button').forEach(btn => {
    btn.addEventListener('click', () => {
      const src = btn.getAttribute('data-lightbox-src');
      const alt = btn.getAttribute('data-lightbox-alt') || '';
      openLightbox(src, alt);
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderEntry(entry) {
  document.title = `${stripHtml(entry.title)} · USNow`;

  // Body class — image-kind gets dark mode
  if (entry.kind === 'image') document.body.classList.add('image-kind');

  // Back link
  const backLink = document.getElementById('back-link');
  const primarySection = entry.sections && entry.sections[0];
  if (primarySection === 'gallery') {
    backLink.href = 'gallery.html';
    backLink.textContent = '← BACK TO GALLERY';
  } else if (primarySection === 'archive') {
    backLink.href = 'archive.html';
    backLink.textContent = '← BACK TO ARCHIVE';
  } else {
    backLink.href = 'journal.html';
    backLink.textContent = '← BACK TO JOURNAL';
  }

  // Hero
  const heroHtml = renderHero(entry);

  // Body — branches by kind
  let mainHtml = '';
  if (entry.kind === 'image') {
    mainHtml = renderImageKind(entry);
  } else {
    mainHtml = renderArticleKind(entry);
  }

  root.innerHTML = heroHtml + mainHtml;
}

function renderHero(entry) {
  const heroStyle = entry.hero_style || 'dark-cosmic';
  const metaPills = (entry.meta || []).map(m =>
    `<span class="pill">${escapeHtml(m)}</span>`
  ).join('');

  return `
    <section class="hero ${heroStyle}">
      ${entry.eyebrow ? `<div class="hero-eyebrow">${escapeHtml(entry.eyebrow)}</div>` : ''}
      <h1 class="hero-title">${entry.title}</h1>
      ${entry.subtitle ? `<p class="hero-subtitle">${escapeHtml(entry.subtitle)}</p>` : ''}
      <div class="hero-rule"></div>
      ${entry.date || metaPills ? `
        <div class="hero-meta">
          ${entry.date ? `<span class="pill">${escapeHtml(entry.date)}</span>` : ''}
          ${metaPills}
        </div>
      ` : ''}
    </section>
  `;
}

function renderArticleKind(entry) {
  const hasSidebar = (entry.related_nodes && entry.related_nodes.length) ||
                     (entry.related_terms && entry.related_terms.length) ||
                     entry.external_url;
  const sidebarHtml = hasSidebar ? renderSidebar(entry, 'article') : '';

  // Companion image at end of article — "cover of the book at the end"
  let companionHtml = '';
  if (entry.companion_image && entry.companion_image.src) {
    const ci = entry.companion_image;
    const tappable = !!ci.gallery_id;
    const tag = tappable ? 'a' : 'div';
    const href = tappable ? `href="content.html?id=${escapeHtml(ci.gallery_id)}"` : '';

    let captionHtml = '';
    if (ci.caption) {
      if (tappable) {
        captionHtml = `
          <div class="companion-caption">
            ${escapeHtml(ci.caption)} &nbsp;·&nbsp;
            <a href="content.html?id=${escapeHtml(ci.gallery_id)}">View in Gallery →</a>
          </div>`;
      } else {
        captionHtml = `<div class="companion-caption">${escapeHtml(ci.caption)}</div>`;
      }
    } else if (tappable) {
      captionHtml = `
        <div class="companion-caption">
          <a href="content.html?id=${escapeHtml(ci.gallery_id)}">View in Gallery →</a>
        </div>`;
    }

    companionHtml = `
      <section class="companion-image-wrap">
        <div class="companion-image-inner">
          <div class="companion-rule"></div>
          <${tag} class="companion-frame" ${href}>
            <img src="${escapeHtml(ci.src)}" alt="${escapeHtml(ci.alt || '')}"/>
          </${tag}>
          ${captionHtml}
        </div>
      </section>
    `;
  }

  return `
    <section class="article-wrap">
      <div class="article-grid ${hasSidebar ? '' : 'no-sidebar'}">
        <article class="article-body">
          ${entry.body || ''}
        </article>
        ${sidebarHtml}
      </div>
    </section>
    ${companionHtml}
    <div class="byline-wrap">
      ${renderByline()}
    </div>
  `;
}

function renderImageKind(entry) {
  const hasSidebar = (entry.related_nodes && entry.related_nodes.length) ||
                     (entry.related_terms && entry.related_terms.length) ||
                     entry.related_article;
  const sidebarHtml = hasSidebar ? renderSidebar(entry, 'image') : '';

  if (!entry.media || !entry.media.src) {
    return `<div class="error-state"><h1>Image missing</h1><p>This gallery entry has no media.</p></div>`;
  }

  const m = entry.media;
  // Use data-attributes + post-render event binding rather than inline onclick.
  // Inline onclick fails when alt/src contain apostrophes (e.g. "America's"):
  // escapeHtml encodes them to &#39;, the browser decodes them back, then the
  // resulting JS string literal has an unescaped apostrophe and breaks silently.
  const galleryHtml = `
    <section class="gallery-wrap">
      <div class="gallery-frame">
        <button class="gallery-button"
                data-lightbox-src="${escapeHtml(m.src)}"
                data-lightbox-alt="${escapeHtml(m.alt || '')}"
                aria-label="Open full-resolution viewer">
          <img src="${escapeHtml(m.src)}" alt="${escapeHtml(m.alt || '')}"/>
        </button>
      </div>
      ${m.caption ? `<div class="gallery-caption">${escapeHtml(m.caption)}</div>` : ''}
    </section>
  `;

  const bodyHtml = (entry.body && entry.body.trim()) ? `
    <section class="gallery-body-wrap">
      <div class="gallery-body-grid ${hasSidebar ? '' : 'no-sidebar'}">
        <article class="gallery-body">${entry.body}</article>
        ${sidebarHtml}
      </div>
    </section>
  ` : (hasSidebar ? `
    <section class="gallery-body-wrap">
      <div class="gallery-body-grid">
        <div></div>
        ${sidebarHtml}
      </div>
    </section>
  ` : '');

  return `
    ${galleryHtml}
    ${bodyHtml}
    <div class="byline-wrap">
      ${renderByline()}
    </div>
  `;
}

function renderSidebar(entry, mode) {
  const nodeLinks = (entry.related_nodes || []).map(n =>
    `<a class="sidebar-pill" href="index.html#${escapeHtml(n)}">${escapeHtml(formatLabel(n))}</a>`
  ).join('');
  const termLinks = (entry.related_terms || []).map(t =>
    `<a class="sidebar-pill" href="compendium.html?term=${escapeHtml(t)}">${escapeHtml(formatLabel(t))}</a>`
  ).join('');

  let extraSection = '';

  // For image-kind: link back to the companion essay
  if (mode === 'image' && entry.related_article) {
    extraSection = `
      <div class="sidebar-section">
        <div class="sidebar-label">The Essay</div>
        <a href="content.html?id=${escapeHtml(entry.related_article)}" class="external-link">
          READ THE ESSAY →
        </a>
      </div>
    `;
  }

  // For article-kind: external link (Substack etc)
  if (mode === 'article' && entry.external_url) {
    extraSection = `
      <div class="sidebar-section">
        <div class="sidebar-label">Also Published</div>
        <a href="${escapeHtml(entry.external_url)}" target="_blank" rel="noreferrer" class="external-link">
          ${escapeHtml(entry.external_label || 'READ EXTERNAL →')}
        </a>
      </div>
    `;
  }

  return `
    <aside class="sidebar">
      ${nodeLinks ? `
        <div class="sidebar-section">
          <div class="sidebar-label">Related Scale Nodes</div>
          <div class="sidebar-pills">${nodeLinks}</div>
        </div>
      ` : ''}
      ${termLinks ? `
        <div class="sidebar-section">
          <div class="sidebar-label">Compendium Terms</div>
          <div class="sidebar-pills">${termLinks}</div>
        </div>
      ` : ''}
      ${extraSection}
    </aside>
  `;
}

function renderByline() {
  return `
    <div class="byline">
      <div class="byline-avatar">⚖️</div>
      <div>
        <div class="byline-name">ATJon</div>
        <div class="byline-pub">atjon.substack.com &nbsp;·&nbsp; usnow.app</div>
      </div>
    </div>
  `;
}

function formatLabel(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function stripHtml(s) {
  const tmp = document.createElement('div');
  tmp.innerHTML = s;
  return tmp.textContent || tmp.innerText || '';
}

/* ============================================================
   LIGHTBOX VIEWER (image-kind only) — ported from gallery.html
   ============================================================ */
const viewer = {
  scale: 1, minScale: 0.5, maxScale: 12,
  x: 0, y: 0,
  imgW: 0, imgH: 0,
  dragging: false, lastX: 0, lastY: 0,
  touches: [],
  lastPinchDist: 0,

  el() { return document.getElementById('lightbox-img-viewer'); },
  canvas() { return document.getElementById('lightbox-canvas'); },
  img() { return document.getElementById('lightbox-img'); },
  indicator() { return document.getElementById('lightbox-zoom-indicator'); },

  applyTransform(reveal) {
    this.el().style.transform = `translate(${this.x}px,${this.y}px) scale(${this.scale})`;
    if (reveal) this.el().style.opacity = '1';
    const pct = Math.round(this.scale * 100);
    this.indicator().textContent = pct + '%';
    this.indicator().style.opacity = pct === 100 ? '0.2' : '0.7';
  },
  centerImage() {
    const vw = window.innerWidth, vh = window.innerHeight;
    this.x = (vw - this.imgW * this.scale) / 2;
    this.y = (vh - this.imgH * this.scale) / 2;
  },
  clampPan() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const sw = this.imgW * this.scale, sh = this.imgH * this.scale;
    const mx = sw * 0.15, my = sh * 0.15;
    this.x = Math.min(vw - mx, Math.max(-(sw - mx), this.x));
    this.y = Math.min(vh - my, Math.max(-(sh - my), this.y));
  },
  zoomAt(clientX, clientY, delta) {
    const oldScale = this.scale;
    this.scale = Math.min(this.maxScale, Math.max(this.minScale, this.scale * delta));
    this.x = clientX - (clientX - this.x) * (this.scale / oldScale);
    this.y = clientY - (clientY - this.y) * (this.scale / oldScale);
    this.clampPan();
    this.applyTransform(false);
  },
  reset() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const fitScale = Math.min(vw / this.imgW, vh / this.imgH);
    this.scale = fitScale;
    this.centerImage();
    this.applyTransform(false);
  },
  load(src) {
    const img = this.img();
    this.el().style.opacity = '0';
    img.onload = () => {
      this.imgW = img.naturalWidth;
      this.imgH = img.naturalHeight;
      const vw = window.innerWidth, vh = window.innerHeight;
      const fitScale = Math.min(vw / this.imgW, vh / this.imgH);
      this.scale = fitScale;
      this.minScale = fitScale * 0.5;
      this.maxScale = Math.max(12, this.imgW / 100);
      this.centerImage();
      this.applyTransform(true);
    };
    img.src = src;
  },
  bindEvents() {
    const canvas = this.canvas();
    canvas.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      this.dragging = true; this.lastX = e.clientX; this.lastY = e.clientY;
      canvas.classList.add('dragging');
    });
    window.addEventListener('mousemove', e => {
      if (!this.dragging) return;
      this.x += e.clientX - this.lastX; this.y += e.clientY - this.lastY;
      this.lastX = e.clientX; this.lastY = e.clientY;
      this.clampPan(); this.applyTransform(false);
    });
    window.addEventListener('mouseup', () => {
      this.dragging = false; canvas.classList.remove('dragging');
    });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 1.1 : 0.91;
      this.zoomAt(e.clientX, e.clientY, delta);
    }, { passive: false });
    canvas.addEventListener('dblclick', e => {
      if (this.scale > this.minScale * 1.5) { this.reset(); }
      else { this.zoomAt(e.clientX, e.clientY, 2.5); }
    });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      this.touches = [...e.touches];
      if (this.touches.length === 2) {
        this.lastPinchDist = Math.hypot(
          this.touches[1].clientX - this.touches[0].clientX,
          this.touches[1].clientY - this.touches[0].clientY
        );
      }
      if (this.touches.length === 1) {
        this.lastX = this.touches[0].clientX; this.lastY = this.touches[0].clientY;
      }
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      this.touches = [...e.touches];
      if (this.touches.length === 2) {
        const dist = Math.hypot(
          this.touches[1].clientX - this.touches[0].clientX,
          this.touches[1].clientY - this.touches[0].clientY
        );
        const midX = (this.touches[0].clientX + this.touches[1].clientX) / 2;
        const midY = (this.touches[0].clientY + this.touches[1].clientY) / 2;
        const delta = dist / this.lastPinchDist;
        this.zoomAt(midX, midY, delta);
        this.lastPinchDist = dist;
      } else if (this.touches.length === 1) {
        const dx = this.touches[0].clientX - this.lastX;
        const dy = this.touches[0].clientY - this.lastY;
        this.x += dx; this.y += dy;
        this.lastX = this.touches[0].clientX; this.lastY = this.touches[0].clientY;
        this.clampPan(); this.applyTransform(false);
      }
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      this.touches = [...e.touches];
    }, { passive: true });
  }
};
viewer.bindEvents();

function openLightbox(src, alt) {
  document.getElementById('lightbox-img').alt = alt || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  viewer.load(src);
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === '0' && document.getElementById('lightbox').classList.contains('open')) {
    viewer.reset();
  }
});
</script>
