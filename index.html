<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USNow — Perspective Engine</title>
    <style>
        :root {
            --gold: #c9a84c;
            --space: #04080f;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--space);
            color: white;
            font-family: 'Georgia', serif;
            height: 100%; overflow: hidden;
        }

        /* THE 3D SCENE */
        #scene-container {
            perspective: 800px; /* This is your "Lens". Lower = more distorted/dramatic */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #universe {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            /* This moves the whole universe toward/away from you */
            transition: transform 0.1s linear; 
        }

        /* THE ORBS */
        .orb {
            position: absolute;
            left: 50%; top: 50%;
            transform-style: preserve-3d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.5s;
        }

        /* Material Styles from your original */
        .mat-me { 
            width: 300px; height: 300px;
            margin-left: -150px; margin-top: -150px;
            background: radial-gradient(circle at 30% 30%, #8bbcf5, #0b1024);
            transform: translateZ(200px); /* Closest to you, almost behind the camera */
            border: 1px solid rgba(139, 188, 245, 0.4);
            box-shadow: 0 0 50px rgba(139, 188, 245, 0.2);
        }

        .mat-community { 
            width: 500px; height: 500px;
            margin-left: -250px; margin-top: -250px;
            background: radial-gradient(circle at 30% 30%, #efc79c, #27140c);
            transform: translateZ(-600px) translateX(200px); /* Further and slightly right */
            opacity: 0.8;
        }

        .mat-nation { 
            width: 800px; height: 800px;
            margin-left: -400px; margin-top: -400px;
            background: radial-gradient(circle at 30% 30%, #c9a84c, #1a1405);
            transform: translateZ(-1500px) translateX(-300px); /* Very far and left */
            opacity: 0.6;
        }

        .label {
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 14px;
            pointer-events: none;
        }

        /* TEXT HUD */
        #hud {
            position: fixed;
            bottom: 40px; width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="scene-container">
        <div id="universe">
            
            <div class="orb mat-me">
                <div class="label">The Observer<br>(Me)</div>
            </div>

            <div class="orb mat-community" onclick="location.href='#community'">
                <div class="label">Community & Place</div>
            </div>

            <div class="orb mat-nation" onclick="location.href='#nation'">
                <div class="label">The Nation<br>(US)</div>
            </div>

        </div>
    </div>

    <div id="hud">
        <p style="color: var(--gold); font-size: 10px;">SCROLL TO MOVE THROUGH SCALE</p>
        <h1 style="font-weight: 200; letter-spacing: 0.5em;">US NOW</h1>
    </div>

    <script>
        let zPos = 0;
        const universe = document.getElementById('universe');

        // Smooth scroll to Z-move
        window.addEventListener('wheel', (e) => {
            // Adjust speed: deltaY is how fast you scroll
            zPos += e.deltaY * 0.5; 
            
            // Limit the "flight" so you don't go into infinite darkness
            if (zPos < 0) zPos = 0;
            if (zPos > 2000) zPos = 2000;

            universe.style.transform = `translateZ(${zPos}px)`;
        });

        // Touch support for mobile
        let startY = 0;
        window.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        window.addEventListener('touchmove', e => {
            let deltaY = startY - e.touches[0].pageY;
            zPos += deltaY * 2;
            if (zPos < 0) zPos = 0;
            if (zPos > 2000) zPos = 2000;
            universe.style.transform = `translateZ(${zPos}px)`;
            startY = e.touches[0].pageY;
        });
    </script>
</body>
</html>
