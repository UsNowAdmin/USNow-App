<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>USNow — The Question is the Answer.</title>
<style>
/* --- INTEGRATING YOUR ORIGINAL MATERIAL SYSTEM --- */
*{box-sizing:border-box;margin:0;padding:0;}
body {
    background: #04080f;
    color: #f0ece4;
    font-family: 'Georgia', serif;
    overflow: hidden; /* Locks traditional scroll for Z-axis */
    height: 100vh;
}

/* 3D VIEWPORT ENGINE */
#z-viewport {
    perspective: 1000px;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
}

#z-camera {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
}

.z-layer {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    padding: 20px;
    text-align: center;
}

/* Z-DEPTH ASSIGNMENTS */
.layer-nation    { transform: translateZ(0px); }
.layer-community { transform: translateZ(-1500px); opacity: 0; transition: opacity 0.8s; }
.layer-self      { transform: translateZ(-3000px); opacity: 0; transition: opacity 0.8s; }

/* ACTIVE STATES (When camera reaches depth) */
.active-layer { opacity: 1 !important; pointer-events: all; }

/* --- REUSING YOUR ORB CSS --- */
.orb-node {
    width: 120px; height: 120px;
    border-radius: 50%;
    position: relative;
    cursor: pointer;
    margin: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.mat-organic { --surface: radial-gradient(circle at 32% 28%,#efc79c 0%,#b87830 34%,#6d3c1f 72%,#27140c 100%); --rim: rgba(255,212,170,0.38); }
.mat-storm { --surface: radial-gradient(circle at 36% 30%,#8bbcf5 0%,#2f6fbc 34%,#21305c 70%,#0b1024 100%); --rim: rgba(170,214,255,0.38); }

.orb-core {
    position: absolute; inset: 0; border-radius: 50%;
    background: var(--surface); border: 1.2px solid var(--rim);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.orb-label {
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.1em; color: #fff; z-index: 5;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

/* UI OVERLAYS */
#depth-nav {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 15px; z-index: 1000;
}

.depth-dot {
    width: 8px; height: 8px; border: 1px solid #c9a84c; border-radius: 50%;
    cursor: pointer; transition: 0.3s;
}

.depth-dot.active { background: #c9a84c; transform: scale(1.5); }

#footer-nav {
    position: fixed; bottom: 20px; width: 100%; text-align: center;
    font-family: 'Courier New', monospace; font-size: 9px;
    letter-spacing: 0.2em; color: #7a6030; z-index: 1000;
}

/* MOBILE FIXES */
@media (max-width: 768px) {
    .orb-node { width: 90px; height: 90px; }
}
</style>
</head>
<body>

<div id="depth-nav">
    <div class="depth-dot active" onclick="goToLayer(0)"></div>
    <div class="depth-dot" onclick="goToLayer(1)"></div>
    <div class="depth-dot" onclick="goToLayer(2)"></div>
</div>

<div id="z-viewport">
    <div id="z-camera">
        
        <section class="z-layer layer-nation active-layer">
            <h2 style="font-size: 10px; letter-spacing: 0.5em; color: #7a6030; margin-bottom: 20px;">I. THE NATION</h2>
            <div style="font-size: 32px; font-weight: 300; margin-bottom: 40px;">What is <em>US Now</em></div>
            
            <div class="orb-container">
                <div class="orb-node mat-organic" onclick="alert('Opening Power & Politics...')">
                    <div class="orb-core"></div>
                    <div class="orb-label">POWER &<br>POLITICS</div>
                </div>
                <div class="orb-node mat-storm" onclick="alert('Opening Civilization...')">
                    <div class="orb-core"></div>
                    <div class="orb-label">HISTORY &<br>CIV</div>
                </div>
            </div>
            <p style="font-size: 11px; opacity: 0.5; margin-top: 40px; font-family: 'Courier New';">SCROLL OR SWIPE TO DIVE</p>
        </section>

        <section class="z-layer layer-community">
            <h2 style="font-size: 10px; letter-spacing: 0.5em; color: #7a6030; margin-bottom: 20px;">II. THE COMMUNITY</h2>
            <div style="font-size: 32px; font-weight: 300; margin-bottom: 40px;">Belonging & Place</div>
            
            <div class="orb-container">
                <div class="orb-node mat-organic" onclick="alert('Opening Education...')">
                    <div class="orb-core"></div>
                    <div class="orb-label">EDUCATION</div>
                </div>
                <div class="orb-node mat-storm" onclick="alert('Opening Race & Class...')">
                    <div class="orb-core"></div>
                    <div class="orb-label">RACE &<br>CLASS</div>
                </div>
            </div>
        </section>

        <section class="z-layer layer-self">
            <h2 style="font-size: 10px; letter-spacing: 0.5em; color: #7a6030; margin-bottom: 20px;">III. THE OBSERVER</h2>
            <div style="font-size: 32px; font-weight: 300; margin-bottom: 40px;">The US Within</div>
            
            <div class="orb-container">
                <div class="orb-node mat-organic" onclick="alert('Opening Consciousness...')">
                    <div class="orb-core"></div>
                    <div class="orb-label">MIND &<br>SPIRIT</div>
                </div>
                <div class="orb-node mat-storm" onclick="alert('Opening Body...')">
                    <div class="orb-core"></div>
                    <div class="orb-label">THE BODY</div>
                </div>
            </div>
        </section>

    </div>
</div>

<div id="footer-nav">
    USNOW.APP · NON-PARTISAN · NON-DENOMINATIONAL · NON-NEGOTIABLE
</div>

<script>
let currentLayer = 0;
const totalLayers = 3;
const camera = document.getElementById('z-camera');
const dots = document.querySelectorAll('.depth-dot');
const layers = document.querySelectorAll('.z-layer');

function goToLayer(index) {
    currentLayer = index;
    
    // Calculate Z-move (1500px steps)
    const zTranslate = index * 1500;
    camera.style.transform = `translateZ(${zTranslate}px)`;
    
    // Update Nav Dots
    dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    
    // Update Layer Visibility
    layers.forEach((layer, i) => {
        layer.classList.toggle('active-layer', i === index);
    });
}

// Handle Mouse Wheel
window.addEventListener('wheel', (e) => {
    if (e.deltaY > 0 && currentLayer < totalLayers - 1) {
        goToLayer(currentLayer + 1);
    } else if (e.deltaY < 0 && currentLayer > 0) {
        goToLayer(currentLayer - 1);
    }
});

// Handle Touch Swipes for Mobile
let touchStartY = 0;
window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
window.addEventListener('touchend', (e) => {
    let touchEndY = e.changedTouches[0].clientY;
    if (touchStartY - touchEndY > 50 && currentLayer < totalLayers - 1) {
        goToLayer(currentLayer + 1); // Swipe Up
    } else if (touchEndY - touchStartY > 50 && currentLayer > 0) {
        goToLayer(currentLayer - 1); // Swipe Down
    }
});
</script>

</body>
</html>
