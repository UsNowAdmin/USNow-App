<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The 📜 List of Living Words · UsNow.app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/compendium.css"/>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<!-- ── SITE NAV (matches /word/ pages — no ticker) ── -->
<nav role="navigation" aria-label="USNow">
  <div class="nav-links">
    <a class="nav-pill" href="/tree.html">🌳 TREE</a>
    <a class="nav-pill" href="/index.html">⚛️ SCALE</a>
    <a class="nav-pill active" href="/compendium.html">📜 LIST</a>
    <a class="nav-pill" href="/word/">📖 WORDS</a>
  </div>
  <a class="nav-logo" href="/" aria-label="USNow home">
    <span class="us">US</span><span class="now">NOW</span><span class="app">.app</span>
  </a>
</nav>

<!-- Measure real nav height into --nav-h so content never clips or gaps across devices -->
<script>
(function(){
  function setNavH(){
    var n=document.querySelector('nav');
    if(n) document.documentElement.style.setProperty('--nav-h', n.offsetHeight + 'px');
  }
  setNavH();
  window.addEventListener('resize', setNavH);
  window.addEventListener('orientationchange', function(){ setTimeout(setNavH,150); });
  window.addEventListener('load', setNavH);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(setNavH); }
})();
</script>

<div class="wrap">

  <header>
    <h1>The <em>📜</em> List of <em>Living</em> Words</h1>
    <h2 class="secondary-headline">Words We <em>Use</em><br>But Don't <em>Agree</em> On</h2>
    <div class="subtitle">A living and growing glossary. Click any word. Suggest one anytime.</div>

    <div class="suggest-form" id="suggest-form">
      <input type="text" id="sg-word" placeholder="Word or phrase…" autocomplete="off" spellcheck="false" maxlength="60">
      <input type="text" id="sg-def" placeholder="Your definition…" autocomplete="off" spellcheck="false" maxlength="280">
      <button id="sg-send" onclick="submitSuggestion()">Submit</button>
      <div class="sg-confirm" id="sg-confirm"></div>
    </div>

    <div class="entry-count" id="entry-count"></div>
  </header>

  <div class="controls">
    <div class="search-row">
      <input type="text" id="search" placeholder="Search words or definitions…" autocomplete="off" spellcheck="false">
      <button class="clear-btn" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div class="filter-controls">
    <div class="cat-row" id="cat-row"></div>
    <div class="alpha-row" id="alpha-row"></div>
  </div>

  <div class="results-info" id="results-info"></div>
  <div id="glossary-list"></div>
  <div class="empty" id="empty-state">No words found — yet.</div>

  <footer>
    <div class="footer-text">The 📜 List of Living Words</div>
    <div class="footer-tagline">©2026 All rights reserved — Licensed and Adapted by UsNow.app.</div>
  </footer>

</div>

<script src="/glories.js"></script>
<script src="/compendium.js"></script>
</body>
</html>
