<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>USNow — Explore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c10;--surface:#13131a;--border:#1e1e2e;
  --text:#e8e8f0;--muted:#5a5a7a;--gold:#c8a96e;
  --card-bg:#f5f1eb;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(12,12,16,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.12em;color:var(--gold);}
.logo span{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;margin-left:8px;vertical-align:middle;}
.search-bar{display:flex;align-items:center;gap:10px;background:#3a3a50;border:1px solid #5a5a78;border-radius:24px;padding:10px 16px;width:200px;}
.search-bar input{background:none;border:none;outline:none;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:0.82rem;width:100%;}
.search-bar input::placeholder{color:#c0c0d8;}
.search-clear{background:none;border:none;color:#c0c0d8;font-size:1rem;cursor:pointer;padding:0;line-height:1;display:none;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.search-clear.visible{display:block;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;}
.loading-dots{display:flex;gap:8px;}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:0.2s;}
.loading-dot:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
.loading-text{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;}

/* TREE — fractal, arbitrary depth */
.tree{padding:0 0 100px;}

/* Every node shares the same pattern regardless of depth */
.tree-node{
  /* depth controlled via JS-set --depth CSS var and padding-left */
}

.node-row{
  display:flex;align-items:stretch;
  border-bottom:1px solid rgba(255,255,255,0.03);
  position:relative;
}

/* Vertical branch line on left — color set by JS */
.node-branch{
  width:3px;flex-shrink:0;
  opacity:0.6;
}

.node-body{
  flex:1;display:flex;align-items:center;
  justify-content:space-between;
  padding:0;
}

.node-tap{
  flex:1;display:flex;align-items:center;gap:10px;
  padding:12px 8px 12px 10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity 0.15s;
}
.node-tap:active{opacity:0.7;}

/* Node marker — scales with depth */
.node-marker{
  flex-shrink:0;border-radius:50%;
}

.node-text{flex:1;min-width:0;}
.node-label{
  font-family:'Bebas Neue',sans-serif;
  letter-spacing:0.08em;line-height:1.1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.node-meta{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.5rem;color:var(--muted);
  letter-spacing:0.06em;margin-top:1px;
}

.node-expand{
  padding:12px 14px 12px 4px;
  cursor:pointer;
  font-size:0.7rem;color:var(--muted);
  transition:transform 0.25s;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}
.node-expand:active{opacity:0.7;}
.tree-node.open > .node-row > .node-body > .node-expand{transform:rotate(90deg);}

/* Children container — collapsed by default */
.node-children{
  max-height:0;overflow:hidden;
  transition:max-height 0.4s ease;
}
.tree-node.open > .node-children{max-height:20000px;}

/* Depth-specific sizing — each level slightly smaller/indented */
/* depth 0 = layer */
.tree-node[data-depth="0"] > .node-row{border-bottom:1px solid var(--border);}
.tree-node[data-depth="0"] > .node-row > .node-branch{width:4px;opacity:1;}
.tree-node[data-depth="0"] .node-label{font-size:1.05rem;}
.tree-node[data-depth="0"] .node-marker{width:9px;height:9px;}
.tree-node[data-depth="0"] > .node-row > .node-body > .node-tap{padding:14px 8px 14px 12px;}
.tree-node[data-depth="0"] > .node-children{padding-left:4px;}

/* depth 1 = orb */
.tree-node[data-depth="1"] .node-label{font-size:0.9rem;}
.tree-node[data-depth="1"] .node-marker{width:16px;height:16px;font-size:0.48rem;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;}
.tree-node[data-depth="1"] > .node-row > .node-body > .node-tap{padding:10px 6px 10px 10px;}
.tree-node[data-depth="1"] > .node-children{padding-left:8px;background:rgba(255,255,255,0.01);}

/* depth 2+ = cards, sub-cards — white face */
.tree-node[data-depth="2"] > .node-row,
.tree-node[data-depth="3"] > .node-row,
.tree-node[data-depth="4"] > .node-row,
.tree-node[data-depth="5"] > .node-row{
  background:var(--card-bg);
  border-radius:7px;
  margin:3px 8px 3px 0;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  overflow:hidden;
}
.tree-node[data-depth="2"] .node-label{font-size:0.9rem;color:#1a1a2e;}
.tree-node[data-depth="3"] .node-label{font-size:0.82rem;color:#1a1a2e;}
.tree-node[data-depth="4"] .node-label{font-size:0.76rem;color:#1a1a2e;}
.tree-node[data-depth="5"] .node-label{font-size:0.72rem;color:#1a1a2e;}
.tree-node[data-depth="2"] .node-meta,
.tree-node[data-depth="3"] .node-meta,
.tree-node[data-depth="4"] .node-meta,
.tree-node[data-depth="5"] .node-meta{color:#8888aa;}
.tree-node[data-depth="2"] .node-expand,
.tree-node[data-depth="3"] .node-expand,
.tree-node[data-depth="4"] .node-expand,
.tree-node[data-depth="5"] .node-expand{color:#aaaacc;}
.tree-node[data-depth="2"] > .node-children{padding-left:12px;}
.tree-node[data-depth="3"] > .node-children{padding-left:10px;}
.tree-node[data-depth="4"] > .node-children{padding-left:8px;}
.tree-node[data-depth="2"] .node-marker{width:3px;height:100%;border-radius:0;position:absolute;left:0;top:0;}
.tree-node[data-depth="2"] > .node-row > .node-body > .node-tap{padding:10px 6px 10px 14px;}
.tree-node[data-depth="3"] > .node-row > .node-body > .node-tap{padding:8px 4px 8px 12px;}
.tree-node[data-depth="4"] > .node-row > .node-body > .node-tap{padding:7px 4px 7px 10px;}
.tree-node[data-depth="5"] > .node-row > .node-body > .node-tap{padding:6px 4px 6px 8px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#f5f1eb;border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);padding-bottom:env(safe-area-inset-bottom,24px);position:relative;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-color-bar{height:6px;width:100%;border-radius:22px 22px 0 0;}
.modal-left-accent{position:absolute;left:0;top:6px;bottom:0;width:4px;}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,0.12);border-radius:2px;margin:14px auto 0;}
.modal-top-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 20px 0 24px;gap:12px;}
.modal-home{font-family:'IBM Plex Mono',monospace;font-size:0.56rem;letter-spacing:0.07em;line-height:1.7;flex:1;}
.home-seg{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s;}
.home-seg:active{opacity:0.6;}
.home-sep{color:#aaaacc;opacity:0.35;margin:0 3px;}
.home-cur{color:#2a2a3e;opacity:0.65;cursor:default;}
.modal-close{background:rgba(0,0,0,0.08);border:none;color:#6666aa;font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;padding:6px 14px;border-radius:14px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.modal-close:active{background:rgba(0,0,0,0.15);}
.modal-type{font-family:'IBM Plex Mono',monospace;font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;padding:5px 24px 0;opacity:0.38;color:#1a1a2e;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.04em;color:#1a1a2e;line-height:1.05;padding:3px 20px 0 24px;}
.modal-sub{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;color:#8888aa;padding:4px 20px 0 24px;line-height:1.5;display:none;}
.modal-divider{height:1px;background:rgba(0,0,0,0.08);margin:14px 20px;}
.modal-section-label{font-family:'IBM Plex Mono',monospace;font-size:0.56rem;letter-spacing:0.14em;color:#8888aa;text-transform:uppercase;padding:0 20px 8px 24px;}
.modal-pills{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 4px 24px;}
.modal-pill{display:flex;align-items:center;gap:7px;background:rgba(20,20,40,0.07);border:1px solid rgba(20,20,40,0.12);border-radius:22px;padding:7px 14px 7px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.15s,transform 0.1s;}
.modal-pill:active{background:rgba(20,20,40,0.14);transform:scale(0.97);}
.pill-orb{width:14px;height:14px;border-radius:50%;flex-shrink:0;box-shadow:0 0 4px currentColor;}
.pill-label{font-family:'Crimson Pro',serif;font-size:0.88rem;color:#1a1a2e;line-height:1;}
.modal-desc{font-family:'Crimson Pro',serif;font-size:1.08rem;line-height:1.7;color:#2a2a3e;padding:0 20px 4px 24px;}
.modal-links{padding:0 20px 4px 24px;display:flex;flex-wrap:wrap;gap:8px;}
.modal-link{display:flex;align-items:center;gap:6px;padding:7px 12px 7px 8px;background:rgba(20,20,40,0.06);border:1px solid rgba(20,20,40,0.1);border-radius:20px;text-decoration:none;-webkit-tap-highlight-color:transparent;max-width:calc(50% - 4px);min-width:0;}
.modal-link:active{background:rgba(20,20,40,0.14);}
.modal-link-emoji{font-size:0.9rem;flex-shrink:0;}
.modal-link-label{font-family:'Crimson Pro',serif;font-size:0.82rem;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* SEARCH */
.search-results{display:none;padding:16px;}
.search-results.visible{display:block;}
.result-count{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:12px;letter-spacing:0.08em;}
.result-list{display:flex;flex-direction:column;gap:6px;}
.result-item{background:var(--card-bg);border-radius:8px;padding:10px 12px 8px 12px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent;}
.result-item:active{opacity:0.85;}
.result-accent{position:absolute;left:0;top:0;bottom:0;width:3px;}
.result-path{font-family:'IBM Plex Mono',monospace;font-size:0.48rem;letter-spacing:0.06em;color:#8888aa;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.result-title{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.04em;color:#1a1a2e;line-height:1.1;}
.result-desc{font-family:'Crimson Pro',serif;font-size:0.72rem;color:#444466;line-height:1.4;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">USNow <span>EXPLORE</span></div>
  <div class="search-bar">
    <span style="color:#c0c0d8;font-size:0.9rem">⌕</span>
    <input type="text" id="searchInput" placeholder="search anything" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search" enterkeyhint="search">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div id="loading" class="loading">
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
  <div class="loading-text">LOADING USNOW</div>
</div>

<div class="search-results" id="searchResults">
  <div class="result-count" id="resultCount"></div>
  <div class="result-list" id="resultList"></div>
</div>

<div class="tree" id="tree" style="display:none"></div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-color-bar" id="modalColorBar"></div>
    <div class="modal-left-accent" id="modalLeftAccent"></div>
    <div class="modal-handle"></div>
    <div class="modal-top-row">
      <div class="modal-home" id="modalHome"></div>
      <button class="modal-close" onclick="closeModal()">CLOSE</button>
    </div>
    <div class="modal-type" id="modalType"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let cardIndex = new Map();
let layerColorMap = new Map();
let DATA = null;

// ─── Color helper ─────────────────────────────────────────────────────────────
function getColor(card) {
  if(!card) return '#888';
  return card.cardColor || card.layerColor || layerColorMap.get(card.layerId) || '#888';
}

// ─── Recursive tree node builder ──────────────────────────────────────────────
// Works at ANY depth — no hardcoded level limit
function buildNode(card, depth, isLast) {
  const color = getColor(card);
  const type = card.cardType || 'card';
  const children = (card.topPills || []).map(id => cardIndex.get(id)).filter(Boolean);
  const hasChildren = children.length > 0;

  const node = document.createElement('div');
  node.className = 'tree-node';
  node.setAttribute('data-depth', Math.min(depth, 5)); // cap CSS depth at 5, deeper still renders
  node.dataset.id = card.id;

  // Node row
  const row = document.createElement('div');
  row.className = 'node-row';

  // Branch line
  const branch = document.createElement('div');
  branch.className = 'node-branch';
  branch.style.background = color;

  // Body
  const body = document.createElement('div');
  body.className = 'node-body';

  // Tap area — opens modal
  const tap = document.createElement('div');
  tap.className = 'node-tap';
  tap.addEventListener('click', e => { e.stopPropagation(); openModal(card.id); });

  // Marker
  const marker = document.createElement('div');
  marker.className = 'node-marker';
  if(depth === 0) {
    marker.style.cssText = 'width:9px;height:9px;border-radius:50%;background:'+color+';box-shadow:0 0 7px '+color+'88;flex-shrink:0;';
  } else if(depth === 1) {
    marker.style.cssText = 'width:18px;height:18px;border-radius:50%;background:'+color+'22;border:1px solid '+color+'55;color:'+color+';font-family:"IBM Plex Mono",monospace;font-size:0.48rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;';
    marker.textContent = children.length || '';
  } else {
    // depth 2+ — left accent bar handled by CSS position:absolute
    marker.style.cssText = 'width:3px;height:100%;position:absolute;left:0;top:0;background:'+color+';border-radius:0;flex-shrink:0;';
  }

  // Text
  const text = document.createElement('div');
  text.className = 'node-text';

  const label = document.createElement('div');
  label.className = 'node-label';
  if(depth >= 2) label.style.color = '#1a1a2e';
  else label.style.color = color;
  label.textContent = card.label;

  const meta = document.createElement('div');
  meta.className = 'node-meta';
  const parts = [];
  if(card.conn > 0) parts.push('⟷ '+card.conn);
  if(card.linkCount > 0) parts.push('↗ '+card.linkCount);
  if(hasChildren) parts.push('↓ '+children.length);
  meta.textContent = parts.join('  ');

  text.appendChild(label);
  if(parts.length) text.appendChild(meta);
  tap.appendChild(marker);
  tap.appendChild(text);
  body.appendChild(tap);

  // Expand toggle
  if(hasChildren) {
    const expand = document.createElement('div');
    expand.className = 'node-expand';
    expand.textContent = '▶';
    expand.addEventListener('click', e => {
      e.stopPropagation();
      node.classList.toggle('open');
    });
    body.appendChild(expand);
  }

  row.appendChild(branch);
  row.appendChild(body);
  node.appendChild(row);

  // Children — recursively build at depth+1
  if(hasChildren) {
    const childContainer = document.createElement('div');
    childContainer.className = 'node-children';
    children.forEach((child, i) => {
      childContainer.appendChild(buildNode(child, depth + 1, i === children.length - 1));
    });
    node.appendChild(childContainer);
  }

  return node;
}

// ─── Build full tree ──────────────────────────────────────────────────────────
function buildTree() {
  const container = document.getElementById('tree');
  container.innerHTML = '';

  DATA.layers.forEach(layer => {
    const layerCard = cardIndex.get(layer.id);
    if(!layerCard) return;

    // Layer node
    const layerNode = buildNode(layerCard, 0, false);

    // Auto-populate layer topPills with orbs or pseudo-orbs
    // (already set during data build)

    container.appendChild(layerNode);
  });
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(cardId) {
  const card = cardIndex.get(cardId);
  if(!card) return;

  const color = getColor(card);
  const type = card.cardType || 'card';

  document.getElementById('modalColorBar').style.background = color;
  document.getElementById('modalLeftAccent').style.background = color + '55';
  document.getElementById('modalType').textContent = type === 'card' ? '' : type.toUpperCase();
  document.getElementById('modalType').style.color = color;
  document.getElementById('modalTitle').textContent = card.label;

  const subEl = document.getElementById('modalSub');
  if(card.sub) { subEl.textContent = card.sub; subEl.style.display = 'block'; }
  else { subEl.textContent = ''; subEl.style.display = 'none'; }

  // Full tappable home path
  const pathSegs = [...(card.path || []), {id: card.id, label: card.label, isCurrent: true}];
  document.getElementById('modalHome').innerHTML = pathSegs.map(seg => {
    const sc = getColor(cardIndex.get(seg.id) || card);
    if(seg.isCurrent) return '<span class="home-cur" style="color:'+sc+'">'+seg.label.toUpperCase()+'</span>';
    return '<span class="home-seg" style="color:'+sc+'" onclick="openModal(\''+seg.id+'\')">'+seg.label.toUpperCase()+'</span>';
  }).join('<span class="home-sep"> › </span>');

  let body = '';

  // GO FURTHER / TOPICS / CARDS
  const topPills = card.topPills || [];
  const validTop = topPills.map(id => cardIndex.get(id)).filter(Boolean);
  if(validTop.length) {
    const lbl = type==='layer'?'TOPICS':type==='orb'?'CARDS':'GO FURTHER';
    body += '<div class="modal-divider"></div><div class="modal-section-label">'+lbl+'</div><div class="modal-pills" id="topPillsCont"></div>';
  }

  // WHAT IT IS
  if(card.desc) {
    body += '<div class="modal-divider"></div><div class="modal-section-label">WHAT IT IS</div><div class="modal-desc">'+card.desc+'</div>';
  }

  // RELATED CONNECTIONS
  const conns = card.connections || [];
  const validConn = conns.map(id => cardIndex.get(id)).filter(Boolean);
  if(validConn.length) {
    body += '<div class="modal-divider"></div><div class="modal-section-label">RELATED CONNECTIONS</div><div class="modal-pills" id="connPillsCont"></div>';
  }

  // OFF-SITE CONNECTIONS
  if(card.links && card.links.length) {
    body += '<div class="modal-divider"></div><div class="modal-section-label">OFF-SITE CONNECTIONS</div><div class="modal-links">';
    card.links.forEach(l => {
      body += '<a class="modal-link" href="'+l.url+'" target="_blank" rel="noopener"><span class="modal-link-emoji">'+(l.emoji||'🔗')+'</span><span class="modal-link-label">'+l.label+'</span></a>';
    });
    body += '</div>';
  }

  body += '<div style="height:24px"></div>';
  document.getElementById('modalBody').innerHTML = body;

  // Wire top pills
  const topCont = document.getElementById('topPillsCont');
  if(topCont) validTop.forEach(t => {
    const pc = getColor(t);
    const pill = document.createElement('div');
    pill.className = 'modal-pill';
    pill.innerHTML = '<div class="pill-orb" style="background:'+pc+';box-shadow:0 0 5px '+pc+'88"></div><span class="pill-label">'+t.label+'</span>';
    pill.addEventListener('click', () => openModal(t.id));
    topCont.appendChild(pill);
  });

  // Wire connection pills
  const connCont = document.getElementById('connPillsCont');
  if(connCont) validConn.forEach(t => {
    const pc = getColor(t);
    const pill = document.createElement('div');
    pill.className = 'modal-pill';
    pill.innerHTML = '<div class="pill-orb" style="background:'+pc+';box-shadow:0 0 5px '+pc+'88"></div><span class="pill-label">'+t.label+'</span>';
    pill.addEventListener('click', () => openModal(t.id));
    connCont.appendChild(pill);
  });

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}

// ─── Search ───────────────────────────────────────────────────────────────────
function clearSearch() {
  const input = document.getElementById('searchInput');
  input.value = ''; input.blur();
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('tree').style.display = '';
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') this.blur();
});

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const res = document.getElementById('searchResults');
  const tree = document.getElementById('tree');
  document.getElementById('searchClear').classList.toggle('visible', this.value.length > 0);

  if(!q || q.length < 2) {
    res.classList.remove('visible');
    tree.style.display = '';
    return;
  }

  const matches = Array.from(cardIndex.values()).filter(c =>
    c.label.toLowerCase().includes(q) ||
    (c.desc && c.desc.toLowerCase().includes(q)) ||
    (c.orbLabel && c.orbLabel.toLowerCase().includes(q)) ||
    (c.layerLabel && c.layerLabel.toLowerCase().includes(q)) ||
    (c.sub && c.sub.toLowerCase().includes(q)) ||
    (c.path && c.path.some(p => p.label.toLowerCase().includes(q)))
  ).slice(0, 50);

  tree.style.display = 'none';
  res.classList.add('visible');
  document.getElementById('resultCount').textContent = matches.length + ' RESULTS FOR "' + q.toUpperCase() + '"';

  const list = document.getElementById('resultList');
  list.innerHTML = '';
  matches.forEach(c => {
    const color = getColor(c);
    const pathStr = c.path && c.path.length ? c.path.map(p => p.label).join(' › ') : (c.layerLabel || '');
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML =
      '<div class="result-accent" style="background:'+color+'"></div>' +
      (pathStr ? '<div class="result-path">'+pathStr+'</div>' : '') +
      '<div class="result-title">'+c.label+'</div>' +
      (c.desc ? '<div class="result-desc">'+c.desc.substring(0,120)+'</div>' : '');
    item.addEventListener('click', () => openModal(c.id));
    list.appendChild(item);
  });
});

// ─── Data loading — fetch from repo ──────────────────────────────────────────
async function init() {
  try {
    // Fetch JSON from repo root — adjust path as needed
    const res = await fetch('/usnow_data_v1.1.json');
    if(!res.ok) throw new Error('fetch failed: ' + res.status);
    DATA = await res.json();
    buildIndex();
    buildTree();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('tree').style.display = '';
  } catch(err) {
    document.getElementById('loading').innerHTML =
      '<div class="loading-text" style="color:#e05a4e">FAILED TO LOAD DATA<br>'+err.message+'</div>';
  }
}

function buildIndex() {
  layerColorMap = new Map();
  DATA.layers.forEach(l => layerColorMap.set(l.id, l.color));

  cardIndex = new Map();

  // Layer cards
  DATA.layers.forEach(layer => {
    if(!cardIndex.has(layer.id)) {
      cardIndex.set(layer.id, {
        id: layer.id, label: layer.label,
        layerId: layer.id, layerLabel: layer.label, layerColor: layer.color,
        orbId: null, orbLabel: null, cardColor: layer.color,
        path: [],
        desc: layer.desc || '', sub: layer.sub || null, links: layer.links || [],
        topPills: (layer.orbs||[]).map(o=>o.id),
        connections: [],
        cardType: 'layer',
        pills: (layer.orbs||[]).length, conn: 0, linkCount: (layer.links||[]).length
      });
    }
  });

  // Orb cards
  DATA.layers.forEach(layer => {
    (layer.orbs||[]).forEach(orb => {
      if(!cardIndex.has(orb.id)) {
        const oc = DATA.cards.filter(c=>c.orbId===orb.id);
        cardIndex.set(orb.id, {
          id: orb.id, label: orb.label,
          layerId: layer.id, layerLabel: layer.label, layerColor: layer.color,
          orbId: orb.id, orbLabel: orb.label, cardColor: orb.color||layer.color,
          path: [{id:layer.id, label:layer.label}],
          desc: orb.desc||'', sub: null, links: orb.links||[],
          topPills: oc.slice(0,8).map(c=>c.id),
          connections: [],
          cardType: 'orb',
          pills: oc.length, conn: 0, linkCount: (orb.links||[]).length
        });
      }
    });
  });

  // Content cards
  DATA.cards.forEach(c => {
    if(!cardIndex.has(c.id)) {
      cardIndex.set(c.id, {
        ...c, cardType: 'card',
        pills: c.topPills.length, conn: c.connections.length, linkCount: c.links.length
      });
    }
  });
}

init();
</script>
